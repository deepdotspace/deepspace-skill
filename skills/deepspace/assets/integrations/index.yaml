          filtering for discovered links.
      - endpoint: exa/get-research
        description: Poll a research task by id; on a terminal status returns the
          synthesized content and settles billing to the task's actual Exa cost.
      - endpoint: exa/news-search
        description: "[DEPRECATED — use /news-search-exa instead] Search news articles.
          Limited to truncated content and 24-hour delay."
      - endpoint: exa/research
        description: Submit a research task that explores the web, gathers sources, and
          synthesizes findings. Returns a researchId immediately; poll
          exa/get-research for status and the completed content. Complex tasks can
          take up to 10 minutes.
      - endpoint: exa/search
