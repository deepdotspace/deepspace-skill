        description: Get current price for a Polymarket outcome token. Prices represent
          market probability (0-1) for that outcome. Side parameter is required
          per Polymarket API docs.
      - endpoint: polymarket/price-history
        description: Get historical price data for a Polymarket market showing how
          outcome probabilities changed over time. Returns time-series data with
          configurable intervals (1m to 1w)
      - endpoint: polymarket/prices
        description: Get current prices for multiple Polymarket outcome tokens in batch.
          Uses POST /prices endpoint internally. Returns prices keyed by
          token_id with BUY/SELL nested values.
      - endpoint: polymarket/search
        description: Full-text search for Polymarket events and markets by title,
          description, or keywords. Uses public-search endpoint. Returns
          matching events with their associated markets
      - endpoint: polymarket/tags
        description: Get available categories/tags for filtering Polymarket events and
          markets
      - endpoint: polymarket/trades
        description: Get recent trade history from Polymarket including trade size,
          price, side (buy/sell), timestamp, and transaction details. Supports
          filtering by market, user, side, and more.
