# Index of all DeepSpace integration endpoints — hand-maintained.
# For full input/output schemas, open the per-integration file referenced below.
#
# USAGE: import { integration } from 'deepspace'
#   await integration.post('<integration>/<endpoint>', { ...params })

sdk_import: import { integration } from 'deepspace'
call_pattern: await integration.post('<integration>/<endpoint>', body)
response_envelope: "{ success: true, data: <endpoint-specific> } | { success:
  false, error: string }"
integration_count: 35
endpoint_count: 254
oauth_required_integrations:
  - google
categories:
  amazon:
    file: amazon.yaml
    endpoint_count: 1
    endpoints:
      - endpoint: amazon/search-products
        description: Search Amazon products
  anthropic:
    file: anthropic.yaml
    endpoint_count: 1
    endpoints:
      - endpoint: anthropic/chat-completion
        description: Generate text completions using Anthropic Claude models via the
          Messages API
  anymailfinder:
    file: anymailfinder.yaml
    endpoint_count: 11
    endpoints:
      - endpoint: anymailfinder/create-bulk
        description: Submit a bulk email-finding search over a table of rows (async;
          poll get-bulk, fetch with download-bulk)
      - endpoint: anymailfinder/create-geo-lead
        description: Submit a GeoLead search — find businesses near a location and their
          emails (async; poll get-geo-lead, fetch with download-geo-lead)
      - endpoint: anymailfinder/download-bulk
        description: Fetch a completed bulk search's results and settle billing to the
          credits charged (first download only)
      - endpoint: anymailfinder/download-geo-lead
        description: Fetch a completed GeoLead search's results and settle billing to the
          credits charged (first download only)
      - endpoint: anymailfinder/find-company
        description: Find a company's email(s) by domain or company name (1 credit on a hit)
      - endpoint: anymailfinder/find-decision-maker
        description: Find a decision-maker's email at a company by role category (2 credits
          on a hit)
      - endpoint: anymailfinder/find-linkedin-url
        description: Find the work email behind a LinkedIn profile URL (1 credit on a hit)
      - endpoint: anymailfinder/find-person
        description: Find a person's work email from a name + company or a LinkedIn URL
          (1 credit on a hit)
      - endpoint: anymailfinder/get-bulk
        description: Poll a bulk search's status and counts by searchId (free)
      - endpoint: anymailfinder/get-geo-lead
        description: Poll a GeoLead search's status and counts by searchId (free)
      - endpoint: anymailfinder/verify-email
        description: Verify a single email address with a real-time SMTP check (0.2 credits)
  apify:
    file: apify.yaml
    endpoint_count: 4
    endpoints:
      - endpoint: apify/get-actor
        description: Get an Apify Actor's record plus its default build input schema (free)
      - endpoint: apify/get-run
        description: Poll an Actor run by id; settles billing to the run's actual usage
          cost and returns dataset items on terminal status (free)
      - endpoint: apify/run-actor
        description: Start an Apify Actor run and bill its actual usage back to the caller
          (async; poll get-run)
      - endpoint: apify/search-actors
        description: Search the Apify Store for Actors (free)
