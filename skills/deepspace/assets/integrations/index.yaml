  tavus:
    file: tavus.yaml
    endpoint_count: 20
    endpoints:
      - endpoint: tavus/create-conversation
        description: Start a Conversational Video Interface session (talking avatar over
          WebRTC); returns a conversation_url. Metered per minute.
      - endpoint: tavus/create-persona
        description: Create a persona (the system prompt/brain that drives a replica in
          conversations). Billed per request.
      - endpoint: tavus/create-replica
        description: Train a replica (talking avatar) from a training video URL. Metered
          — flat training fee, settled on a completed get-replica.
      - endpoint: tavus/delete-conversation
        description: Delete a conversation by id (free)
      - endpoint: tavus/delete-persona
        description: Delete a persona by id (free)
      - endpoint: tavus/delete-replica
        description: Delete a replica by id (free)
      - endpoint: tavus/delete-video
        description: Delete a generated video by id (free)
      - endpoint: tavus/end-conversation
        description: End an active conversation by id (free)
      - endpoint: tavus/generate-video
        description: Generate an async video of a replica reading a script (or driven by
          audio). Metered per minute of output (poll get-video).
      - endpoint: tavus/get-conversation
        description: Get a conversation by id; settles the metered cost once it has ended
          (free)
      - endpoint: tavus/get-persona
        description: Get a persona by id (free)
      - endpoint: tavus/get-replica
        description: Get a replica by id; settles the training fee once completed (free)
      - endpoint: tavus/get-video
        description: Get a generated video by id; settles the fixed cost once ready (free)
      - endpoint: tavus/list-conversations
        description: List conversations (free)
      - endpoint: tavus/list-personas
        description: List personas (free)
      - endpoint: tavus/list-replicas
        description: List replicas (free)
      - endpoint: tavus/list-videos
        description: List generated videos (free)
      - endpoint: tavus/patch-persona
        description: Update a persona with an RFC 6902 JSON Patch array (free)
      - endpoint: tavus/rename-replica
        description: Rename a replica by id (free)
      - endpoint: tavus/rename-video
        description: Rename a generated video by id (free)
