          hosted consent URL (free)
      - endpoint: composio/list-connections
        description: List the calling user's connections, scoped to this app (free)
      - endpoint: composio/list-tools
        description: Discover Composio tools and their input schemas (free)
      - endpoint: composio/list-toolkits
        description: Discover connectable Composio toolkits/apps (free)
