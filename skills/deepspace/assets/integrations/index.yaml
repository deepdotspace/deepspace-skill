        description: Delete the calling user's connection to a toolkit (free)
      - endpoint: composio/execute-tool
        description: Execute a Composio tool as the calling user on their connected
          account (billed per call; returns a connect-me signal if not connected)
      - endpoint: composio/get-connection
        description: Report the calling user's connection status for a connected account
