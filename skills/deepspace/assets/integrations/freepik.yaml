integration: freepik
endpoint_count: 8
usage_example: await integration.post('freepik/download-icons', { /* ...params */ })
tools:
  download-icons:
    method: POST
    endpoint_key: freepik/download-icons
    description: Download a Freepik icon
    input_schema:
      type: object
      properties:
        id:
          type: number
      required:
        - id
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Raw Freepik download API response (typically includes download URL)
          additionalProperties: true
        error:
          type: string
      required:
        - success
